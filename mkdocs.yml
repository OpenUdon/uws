site_url: https://openudon.github.io/uws/
repo_url: https://github.com/OpenUdon/uws
repo_name: OpenUdon/uws
docs_dir: docs
copyright: "© 2026 OpenUdon/uws · Udon Workflow Specification v1.1.0 · Apache 2.0"

